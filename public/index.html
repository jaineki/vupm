<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px dashed #dee2e6;
            text-align: center;
        }

        .upload-area {
            position: relative;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        #fileInput {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .file-input-label:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .file-name {
            margin-top: 15px;
            color: #495057;
            font-size: 0.95rem;
        }

        .upload-btn {
            margin-top: 20px;
            padding: 12px 40px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            margin-top: 8px;
            color: #495057;
            font-size: 0.9rem;
        }

        .status-message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }

        .status-message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .files-section {
            margin-top: 30px;
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .files-header h2 {
            color: #333;
            font-size: 1.8rem;
        }

        .refresh-btn {
            padding: 8px 20px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #138496;
            transform: scale(1.05);
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .file-preview {
            width: 100%;
            height: 200px;
            background: #dee2e6;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .file-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-preview .file-icon {
            font-size: 4rem;
            color: #6c757d;
        }

        .file-info {
            margin-bottom: 15px;
        }

        .file-name-display {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .file-size {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            min-width: 60px;
        }

        .file-actions .download-btn {
            background: #007bff;
            color: white;
        }

        .file-actions .download-btn:hover {
            background: #0056b3;
        }

        .file-actions .delete-btn {
            background: #dc3545;
            color: white;
        }

        .file-actions .delete-btn:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .files-grid {
                grid-template-columns: 1fr;
            }
            
            .file-actions button {
                min-width: 50px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 <span>File Upload System</span></h1>
        
        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-area">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput">
                    <label class="file-input-label" for="fileInput">Choose File</label>
                </div>
                <div class="file-name" id="fileName">No file selected</div>
                <button class="upload-btn" id="uploadBtn">Upload File</button>
                
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
                
                <div class="status-message" id="statusMessage"></div>
            </div>
        </div>

        <!-- Files Section -->
        <div class="files-section">
            <div class="files-header">
                <h2>Uploaded Files</h2>
                <button class="refresh-btn" onclick="loadFiles()">🔄 Refresh</button>
            </div>
            <div id="filesContainer">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <p>No files uploaded yet. Upload your first file!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');
        const filesContainer = document.getElementById('filesContainer');

        // File selection
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                selectedFile = this.files[0];
                fileName.textContent = `📄 ${selectedFile.name} (${formatFileSize(selectedFile.size)})`;
                statusMessage.className = 'status-message';
                statusMessage.style.display = 'none';
            } else {
                selectedFile = null;
                fileName.textContent = 'No file selected';
            }
        });

        // Upload function
        uploadBtn.addEventListener('click', uploadFile);

        async function uploadFile() {
            if (!selectedFile) {
                showStatus('Please select a file first', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            statusMessage.className = 'status-message';
            statusMessage.style.display = 'none';

            try {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = percentComplete + '%';
                        progressText.textContent = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', function() {
                    if (this.status === 200) {
                        const response = JSON.parse(this.responseText);
                        showStatus(`✅ ${response.message} - ${response.filename}`, 'success');
                        progressFill.style.width = '100%';
                        progressText.textContent = '100%';
                        selectedFile = null;
                        fileInput.value = '';
                        fileName.textContent = 'No file selected';
                        loadFiles(); // Refresh file list
                    } else {
                        const response = JSON.parse(this.responseText);
                        showStatus(`❌ Upload failed: ${response.message || 'Unknown error'}`, 'error');
                    }
                    uploadBtn.disabled = false;
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 3000);
                });

                xhr.addEventListener('error', function() {
                    showStatus('❌ Network error. Please try again.', 'error');
                    uploadBtn.disabled = false;
                    progressContainer.style.display = 'none';
                });

                xhr.open('POST', '/upload');
                xhr.send(formData);

            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
                uploadBtn.disabled = false;
                progressContainer.style.display = 'none';
            }
        }

        // Load files
        async function loadFiles() {
            try {
                const response = await fetch('/files');
                const data = await response.json();

                if (!data.success) {
                    showStatus('Error loading files', 'error');
                    return;
                }

                if (data.files.length === 0) {
                    filesContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📂</div>
                            <p>No files uploaded yet. Upload your first file!</p>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="files-grid">';
                data.files.forEach(file => {
                    html += createFileCard(file);
                });
                html += '</div>';
                filesContainer.innerHTML = html;

            } catch (error) {
                console.error('Error loading files:', error);
                showStatus('Error loading files', 'error');
            }
        }

        function createFileCard(file) {
            const fileSize = formatFileSize(file.fileSize);
            const uploadDate = new Date(file.uploadDate).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let previewHtml = '';
            const fileType = file.contentType || '';

            if (fileType.startsWith('image/')) {
                previewHtml = `<img src="${file.url}" alt="${file.filename}" loading="lazy">`;
            } else if (fileType.startsWith('video/')) {
                previewHtml = `
                    <video controls preload="metadata">
                        <source src="${file.url}" type="${fileType}">
                        Your browser does not support the video tag.
                    </video>
                `;
            } else {
                const iconMap = {
                    'application/pdf': '📄',
                    'application/zip': '📦',
                    'application/msword': '📝',
                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📝',
                    'application/vnd.ms-excel': '📊',
                    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': '📊',
                    'application/vnd.ms-powerpoint': '📽️',
                    'application/vnd.openxmlformats-officedocument.presentationml.presentation': '📽️',
                    'text/plain': '📃'
                };
                const icon = iconMap[fileType] || '📁';
                previewHtml = `<div class="file-icon">${icon}</div>`;
            }

            return `
                <div class="file-card" data-id="${file.id}">
                    <div class="file-preview">
                        ${previewHtml}
                    </div>
                    <div class="file-info">
                        <div class="file-name-display" title="${file.filename}">${file.filename}</div>
                        <div class="file-size">${fileSize} • ${uploadDate}</div>
                    </div>
                    <div class="file-actions">
                        <button class="download-btn" onclick="downloadFile('${file.id}')">⬇ Download</button>
                        <button class="delete-btn" onclick="deleteFile('${file.id}')">🗑 Delete</button>
                    </div>
                </div>
            `;
        }

        // Download file
        function downloadFile(fileId) {
            window.open(`/file/${fileId}`, '_blank');
        }

        // Delete file
        async function deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file?')) {
                return;
            }

            try {
                const response = await fetch(`/file/${fileId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    showStatus('✅ File deleted successfully', 'success');
                    loadFiles(); // Refresh list
                } else {
                    showStatus(`❌ Delete failed: ${data.message}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        // Helper functions
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
        }

        // Load files on page load
        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
  </html>
